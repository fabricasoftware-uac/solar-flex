<svg xmlns="http://www.w3.org/2000/svg" width="220" height="46" viewBox="0 0 220 46">
  <!-- batería solar cargándose en bucle -->
  <rect x="8" y="10" width="180" height="26" rx="9" fill="none" stroke="#424242" stroke-width="1.6"/>
  <rect x="192" y="18" width="8" height="10" rx="3" fill="#424242"/>
  <clipPath id="cell">
    <rect x="13" y="15" width="170" height="16" rx="6"/>
  </clipPath>
  <rect x="13" y="15" width="170" height="16" clip-path="url(#cell)" fill="#ffffff" opacity="0.9">
    <animate attributeName="width" values="6;170;170" keyTimes="0;0.75;1" dur="4.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0.9;0.25" keyTimes="0;0.75;1" dur="4.6s" repeatCount="indefinite"/>
  </rect>
  <circle cx="110" cy="23" r="3" fill="#0a0a0a">
    <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.5;0.62;0.8" dur="4.6s" repeatCount="indefinite"/>
  </circle>
</svg>
