<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.45" stop-color="#aaaaaa" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <style>
      .tw { animation: tw 2.8s ease-in-out infinite; }
      .d1 { animation-delay: .5s } .d2 { animation-delay: 1.1s }
      .d3 { animation-delay: 1.7s } .d4 { animation-delay: 2.2s }
      @keyframes tw { 0%,100% { opacity:.10 } 50% { opacity:.75 } }
      .mark { animation: br 4.2s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 50%; }
      @keyframes br { 0%,100% { transform: scale(1) } 50% { transform: scale(1.045) } }
    </style>
  </defs>

  <rect width="1200" height="320" fill="#0a0a0a"/>

  <!-- sol difuso latiendo -->
  <circle cx="600" cy="130" r="190" fill="url(#sun)">
    <animate attributeName="opacity" values="0.75;1;0.75" dur="4.2s" repeatCount="indefinite"/>
  </circle>

  <!-- cielo -->
  <g fill="#ffffff">
    <circle class="tw"    cx="64"   cy="52"  r="1.6"/>
    <circle class="tw d2" cx="142"  cy="188" r="1.1"/>
    <circle class="tw d3" cx="216"  cy="84"  r="1.9"/>
    <circle class="tw d1" cx="287"  cy="243" r="1.2"/>
    <circle class="tw d4" cx="342"  cy="41"  r="1.4"/>
    <circle class="tw d2" cx="398"  cy="150" r="1.0"/>
    <circle class="tw"    cx="452"  cy="266" r="1.7"/>
    <circle class="tw d3" cx="510"  cy="58"  r="1.2"/>
    <circle class="tw d1" cx="583"  cy="284" r="1.5"/>
    <circle class="tw d4" cx="663"  cy="47"  r="1.1"/>
    <circle class="tw d2" cx="731"  cy="262" r="1.8"/>
    <circle class="tw"    cx="787"  cy="120" r="1.2"/>
    <circle class="tw d3" cx="846"  cy="212" r="1.5"/>
    <circle class="tw d1" cx="905"  cy="66"  r="1.1"/>
    <circle class="tw d4" cx="967"  cy="176" r="1.9"/>
    <circle class="tw d2" cx="1038" cy="94"  r="1.3"/>
    <circle class="tw"    cx="1096" cy="238" r="1.5"/>
    <circle class="tw d3" cx="1152" cy="52"  r="1.2"/>
    <circle class="tw d1" cx="96"   cy="286" r="1.3"/>
    <circle class="tw d4" cx="1170" cy="300" r="1.4"/>
  </g>

  <!-- estrella fugaz -->
  <g opacity="0">
    <line x1="0" y1="0" x2="-92" y2="-26" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" from="120 40" to="1320 260" dur="6.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.8;0;0" keyTimes="0;0.06;0.12;0.22;1" dur="6.5s" repeatCount="indefinite"/>
  </g>

  <!-- isotipo: cluster de gotas de la marca -->
  <g transform="translate(552 70) scale(1.5)">
    <g class="mark" fill="#ffffff">
      <ellipse cx="27" cy="40" rx="11" ry="10"/>
      <ellipse cx="23" cy="20" rx="7" ry="6" transform="rotate(-18 23 20)"/>
      <ellipse cx="40" cy="15" rx="5" ry="4.4"/>
      <ellipse cx="45" cy="29" rx="6" ry="5.4"/>
      <ellipse cx="43" cy="45" rx="4.4" ry="4"/>
      <circle cx="54" cy="20" r="2.8"/>
    </g>
  </g>

  <text x="600" y="238" text-anchor="middle" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="58" font-weight="bold" letter-spacing="3" fill="#ffffff">Solarion</text>
  <text x="600" y="272" text-anchor="middle" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="15" letter-spacing="5" fill="#aaaaaa">ENERGÍA QUE TE DA LIBERTAD</text>
</svg>
